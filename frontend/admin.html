<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Brasa Park</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
  </style>
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
      <a class="navbar-brand fw-bold" href="./index.html">🎡 Brasa Park Admin</a>
      <a class="btn btn-warning fw-bold btn-sm" href="./cadastroAtracao.html">+ Cadastrar Nova Atração</a>
    </div>
  </nav>

  <main class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold m-0">Painel de Controle das Atrações</h2>
    </div>

    <div class="table-responsive bg-white p-4 shadow-sm rounded-4">
      <table class="table table-hover align-middle m-0">
        <thead class="table-dark">
          <tr>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Tipo</th>
            <th>Alt. Mínima</th>
            <th>Capacidade</th>
            <th>Status</th>
            <th class="text-center">Ações</th>
          </tr>
        </thead>
        <tbody id="lista">
          </tbody>
      </table>
    </div>
  </main>

  <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <form id="editForm" class="modal-content">
        <div class="modal-header bg-dark text-white">
          <h5 class="modal-title fw-bold" id="editModalLabel">Editar Atração</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="edit-id">

          <div class="mb-3">
            <label for="edit-nome" class="form-label fw-bold">Nome</label>
            <input type="text" class="form-control" id="edit-nome" required>
          </div>
          <div class="mb-3">
            <label for="edit-descricao" class="form-label fw-bold">Descrição</label>
            <input type="text" class="form-control" id="edit-descricao">
          </div>
          <div class="mb-3">
            <label for="edit-tipo" class="form-label fw-bold">Tipo</label>
            <input type="text" class="form-control" id="edit-tipo">
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="edit-alturaMin" class="form-label fw-bold">Alt. Mínima (m)</label>
              <input type="number" step="0.01" class="form-control" id="edit-alturaMin">
            </div>
            <div class="col-md-6 mb-3">
              <label for="edit-capacidade" class="form-label fw-bold">Capacidade</label>
              <input type="number" class="form-control" id="edit-capacidade">
            </div>
          </div>
          <div class="mb-3">
            <label for="edit-status" class="form-label fw-bold">Status</label>
            <select class="form-select" id="edit-status">
              <option value="Ativa">Ativa</option>
              <option value="Manutenção">Manutenção</option>
              <option value="Inativa">Inativa</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="submit" class="btn btn-success fw-bold">Salvar Alterações</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="./js/admin.js"></script>
</body>
</html>
