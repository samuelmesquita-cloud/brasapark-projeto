<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <title>

    Cadastro Cliente

  </title>

  <link
    rel="stylesheet"
    href="./css/style2.css"
  >

</head>

<body>

<div class="background-overlay">

  <main class="container">

    <section class="info-side">

      <img
        src="./logo.png"
        class="brand-logo"
      >

      <h1>

        Comprar Ingresso

      </h1>

    </section>

    <section class="form-side">

      <div class="glass-card">

        <h2>

          Cadastro Cliente

        </h2>

        <form id="form-cliente">

          <input
            id="nome"
            placeholder="Nome"
            required
          >

          <input
            id="email"
            placeholder="Email"
            required
          >

          <input
            id="telefone"
            placeholder="Telefone"
            required
          >

          <input
            id="atracaoId"
            type="number"
            placeholder="ID da atração"
          >

          <button
            type="submit"
            class="btn-main"
          >

            Finalizar Compra

          </button>

        </form>

      </div>

    </section>

  </main>

</div>

<script
  type="module"
  src="./js/cadastroCliente.js">
</script>

</body>
</html>
