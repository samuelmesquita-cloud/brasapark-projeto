<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Brasa Park</title>

  <link rel="stylesheet" href="style2.css/style2.css">
</head>

<body>

<div class="background-overlay">

  <main class="container">

    <section class="info-side">
      <div class="logo">
        <img src="logo (1).png" class="brand-logo">
      </div>

      <h1>Criar Nova Atração</h1>

    </section>

    <section class="form-side">

      <div class="glass-card">

        <h2>Cadastro de Atração</h2>

        <!-- 🔥 ID PADRÃO PARA JS FUNCIONAR -->
        <form id="form-atracao">

          <input id="nome" type="text" placeholder="Nome" required>
          <input id="descricao" type="text" placeholder="Descrição">
          <input id="tipo" type="text" placeholder="Tipo">
          <input id="altura" type="number" placeholder="Altura mínima">
          <input id="capacidade" type="number" placeholder="Capacidade">

          <select id="status">
            <option value="ativa">Ativa</option>
            <option value="manutencao">Manutenção</option>
            <option value="inativa">Inativa</option>
          </select>

          <button type="submit">Cadastrar</button>

        </form>

      </div>

    </section>

  </main>

</div>

<!-- 🔥 JS CORRETO -->
<script type="module" src="./js/main.js"></script>

</body>
</html>
