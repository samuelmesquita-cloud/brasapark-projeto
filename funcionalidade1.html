<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brasa Park</title>
  <link rel="stylesheet" href="style1.css">

  <style>
      body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    
    /* HEADER */
    header {
      background-color: orange;
      padding: 15px;
      text-align: center;
    }
    
    header img {
      width: 120px;
      display: block;
      margin: 0 auto 10px;
    }
    
    header a {
      color: white;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }
    
    /* HERO */
    section {
      text-align: center;
    }
    
    section img {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
    }
    
    section h1 {
      color: #ffcc33;
      font-size: 36px;
      margin: 20px 0;
    }
    
    /* FOOTER */
    footer {
      background-color: orange;
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 14px;
    }

  </style>

</head>
<body>

  <!-- Logo e Menu -->
  <header>
    <img src="imagens/logo.png" alt="Logo Brasa Park">
    <a href="#">Página inicial</a>
    <a href="#">O Parque</a>
    <a href="#">Novidades</a>
  </header>

  <!-- Hero Section -->
  <section>
    <img src="imagens/parque-illustration.png" alt="Imagem do Parque">
    <h1>Compre já seu ingresso!</h1>
  </section>


  <!-- Contato -->
  <footer>
    <p>Telefone: 40028922</p>
    <p>Email: brasaspark@comp.com.br</p>
  </footer>

<script type="module" src="js/main.js"></script>
  
</body>
</html>
