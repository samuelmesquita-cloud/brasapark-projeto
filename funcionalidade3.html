<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Brasa Park</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="background-overlay">
        <main class="container">
            <section class="info-side">
                <div class="logo">
                    <img src="logo.png" alt="Logo" class="brand-logo">
                </div>
                <div class="content-text">
                    <h1>Criar <br> Nova Conta</h1>
                    <hr class="divider">
                    <p class="description">
                        Faça seu cadastro para receber todas as nossas novidades e ofertas exclusivas do Brasa Park.
                    </p>
                </div>
            </section>

            <section class="form-side">
                <div class="glass-card">
                    <h2>Login</h2>
                    <form id="formCadastro">
                        <div class="input-group">
                            <label for="nome_cliente">NAME</label>
                            <input type="text" id="nome_cliente" placeholder="João Silva" required>
                        </div>

                        <div class="input-group">
                            <label for="email_cliente">EMAIL</label>
                            <input type="email" id="email_cliente" placeholder="exemplo@gmail.com" required>
                        </div>

                        <div class="input-group">
                            <label for="telefone_cliente">PHONE</label>
                            <input type="tel" id="telefone_cliente" placeholder="(11) 91234-5678" required>
                        </div>

                        <button type="submit" class="btn-main">Cadastrar</button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <div id="toast">Cadastro realizado com sucesso!✔️ </div>

<script>
    document.getElementById("formCadastro").addEventListener("submit", function(e) {
        e.preventDefault(); 
        const nome = document.getElementById("nome_cliente").value.trim();
        const email = document.getElementById("email_cliente").value.trim();
        const telefone = document.getElementById("telefone_cliente").value.trim();

        if(nome && email && telefone) {
            
            const toast = document.getElementById("toast");
            toast.classList.add("show");
            
            
            setTimeout(function(){ 
                toast.classList.remove("show"); 
            }, 3000);

           
            
        } else {
            alert("Por favor, preencha todos os campos.");
        }
    });
</script>
</body>
</html>
