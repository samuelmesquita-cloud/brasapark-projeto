<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Brasa Park</title>
  <link rel="stylesheet" href="style2.css">
  <style>
    /* Corpo da página */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0b6fa4; /* azul do fundo */
      text-align: center;
    }
    
    /* Título */
    h1 {
      background-color: #ff4b3a; /* vermelho */
      color: black;
      padding: 20px;
      border-radius: 40px;
      width: 80%;
      margin: 30px auto;
      font-size: 22px;
    }
    
    /* Formulário */
    form {
      background-color: white;
      width: 80%;
      margin: 0 auto;
      padding: 20px;
      border-radius: 10px;
    }
    
    /* Labels */
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
      text-align: left;
    }
    
    /* Inputs */
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 20px;
      border: 1px solid #ccc;
    }
    
    /* Botão */
    button {
      margin-top: 20px;
      background-color: #ff4b3a;
      color: white;
      border: none;
      padding: 10px 30px;
      border-radius: 20px;
      cursor: pointer;
    }
    
    /* Ajuste da imagem final (logo) */
    img {
      display: block;
      width: 260px;           /* tamanho parecido com o exemplo */
      margin: 30px auto 0;    /* centraliza e cria espaço do formulário */
    }

  </style>
</head>
<body>

  <h1>Faça seu cadastro para receber todas as nossas novidades!</h1>

  <form action="/example.html" method="POST">
      <!-- Nome -->
      <label for="nome">Nome</label>
      <input type="text" name="nome" id="nome" placeholder="Exemplo: João Silva">

      <!-- Email -->
      <label for="email">Email</label>
      <input type="email" name="email" id="email" placeholder="Exemplo: exemplo@gmail.com">

      <!-- Telefone -->
      <label for="telefone">Telefone</label>
      <input type="tel" name="telefone" id="telefone" placeholder="Exemplo: (11) 91234-5678">

      <!-- Botão para enviar -->
      <button type="submit">Cadastrar</button>
  </form>
  <img src="imagens/logo.png" alt="Logo Brasa Park">

<script type="module" src="../js/cadastro.js"></script>
  
</body>
</html>
