<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Brasa Park</title>
  <link rel="stylesheet" href="style2.css">

</head>
<body>

  <h1>Faça seu cadastro para receber todas as nossas novidades!</h1>

  <form action="/example.html" method="POST">
      <!-- Nome -->
      <label for="nome">Nome</label>
      <input type="text" name="nome" id="nome" placeholder="Exemplo: João Silva">

      <!-- Email -->
      <label for="email">Email</label>
      <input type="email" name="email" id="email" placeholder="Exemplo: exemplo@gmail.com">

      <!-- Telefone -->
      <label for="telefone">Telefone</label>
      <input type="tel" name="telefone" id="telefone" placeholder="Exemplo: (11) 91234-5678">

      <!-- Botão para enviar -->
      <button type="submit">Cadastrar</button>
  </form>
  <img src="imagens/logo.png" alt="Logo Brasa Park">

<script type="module" src="js/cadastro.js"></script>
  
</body>
</html>
